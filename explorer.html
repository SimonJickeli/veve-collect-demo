<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wiki Explorer — VeVe Collect</title>
<link rel="stylesheet" href="assets/style.css?v=6" />
<style>
  .crumb { font-size:12.5px; color:var(--muted); margin:2px 0 14px; display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
  .crumb a { color:var(--accent-2); } .crumb .sep { opacity:.5; }
  .exsearch { display:flex; gap:10px; margin:6px 0 4px; } .exsearch input { flex:1; }
  .exgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
  .excard { display:block; background:linear-gradient(180deg,var(--panel-2),var(--panel)); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; transition:border-color .12s, transform .12s; }
  .excard:hover { border-color:var(--accent); transform:translateY(-2px); text-decoration:none; }
  .excard .thumb { width:100%; aspect-ratio:1/1; object-fit:cover; background:#12162a; display:block; }
  .excard .thumb.noimg { display:flex; align-items:center; justify-content:center; font-size:34px; }
  .excard .body { padding:9px 11px; }
  .excard .nm { font-weight:700; font-size:13px; line-height:1.25; }
  .excard .mt { margin-top:5px; display:flex; gap:6px; flex-wrap:wrap; align-items:center; font-size:11px; color:var(--muted); }
  .unigrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px; }
  .unitile { display:block; background:linear-gradient(180deg,var(--panel-2),var(--panel)); border:1px solid var(--border); border-radius:14px; overflow:hidden; cursor:pointer; transition:border-color .12s, transform .12s; }
  .unitile:hover { border-color:var(--accent); transform:translateY(-3px); text-decoration:none; }
  .unitile .uhero { width:100%; aspect-ratio:16/10; object-fit:cover; background:#12162a; display:block; }
  .unitile .uhero.noimg { display:flex; align-items:center; justify-content:center; font-size:42px; }
  .unitile .ubody { padding:12px 14px; }
  .unitile h3 { margin:0 0 3px; font-size:16px; text-transform:capitalize; }
  .unitile .c { font-size:12.5px; color:var(--muted); }
  /* filter / sort bar for list grids */
  .exctl { display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin:0 0 14px; padding:10px 13px; background:var(--bg-2); border:1px solid var(--border); border-radius:12px; }
  .exctl .cnt { margin-right:auto; font-weight:700; font-size:13px; }
  .exctl label { font-size:12.5px; color:var(--muted); display:inline-flex; gap:6px; align-items:center; }
  .exctl select { background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:13px; }
  /* buy links on the collectible page */
  .exbuy { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:4px 0 16px; }
  .exbuy .buylink { display:inline-block; font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:999px; border:1px solid var(--border); color:var(--accent-2); background:var(--bg-2); }
  .exbuy .buylink:hover { border-color:var(--accent); text-decoration:none; }
  .cpage { display:grid; grid-template-columns:300px 1fr; gap:26px; align-items:start; }
  @media (max-width:720px){ .cpage { grid-template-columns:1fr; } }
  .cpage .hero-img { width:100%; border-radius:14px; border:1px solid var(--border); background:#12162a; aspect-ratio:1/1; object-fit:cover; }
  .cpage .hero-img.noimg { display:flex; align-items:center; justify-content:center; font-size:70px; }
  .cpage h1 { font-size:26px; margin:0 0 8px; letter-spacing:-.4px; }
  .facts { display:grid; grid-template-columns:auto 1fr; gap:7px 14px; font-size:13.5px; margin:14px 0; }
  .facts dt { color:var(--muted); } .facts dd { margin:0; font-weight:600; }
  .facts a { color:var(--accent-2); }
  .prose { font-size:14.5px; line-height:1.6; color:var(--text); margin:10px 0; }
  .prose h4 { margin:18px 0 4px; font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
  .sec-h { font-size:15px; font-weight:800; margin:26px 0 12px; }
  .backchip { display:inline-block; font-size:12.5px; color:var(--accent-2); cursor:pointer; margin-bottom:10px; }
  .tagrow { display:flex; gap:8px; flex-wrap:wrap; margin:6px 0 2px; }
  .tag { font-size:12px; border:1px solid var(--border); background:var(--bg-2); border-radius:999px; padding:3px 11px; cursor:pointer; }
  .tag:hover { border-color:var(--accent); }
  .subgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:12px; margin-bottom:4px; }
  .subtile { display:flex; align-items:center; gap:10px; background:linear-gradient(135deg,rgba(11,153,255,.12),var(--panel)); border:1px solid var(--border); border-radius:12px; padding:10px 12px; cursor:pointer; transition:border-color .12s, transform .12s; }
  .subtile:hover { border-color:var(--accent); transform:translateY(-2px); text-decoration:none; }
  .subtile.muted { background:var(--panel); opacity:.7; }
  .subtile .sthumb { width:40px; height:40px; border-radius:8px; object-fit:cover; background:#12162a; flex:0 0 auto; }
  .subtile .sthumb.noimg { display:flex; align-items:center; justify-content:center; font-size:20px; }
  .subtile .sl { font-weight:700; font-size:13.5px; line-height:1.2; }
  .subtile .sc { font-size:11.5px; color:var(--muted); margin-top:2px; }
  .notable { display:grid; grid-template-columns:repeat(auto-fill,minmax(225px,1fr)); gap:12px; }
  .notecard { display:flex; align-items:center; gap:11px; background:linear-gradient(135deg,rgba(255,196,0,.09),var(--panel)); border:1px solid var(--border); border-radius:12px; padding:10px 12px; cursor:pointer; transition:border-color .12s, transform .12s; }
  .notecard:hover { border-color:var(--accent-2); transform:translateY(-2px); text-decoration:none; }
  .notecard .nthumb { width:44px; height:44px; border-radius:8px; object-fit:cover; background:#12162a; flex:0 0 auto; }
  .notecard .nthumb.noimg { display:flex; align-items:center; justify-content:center; font-size:22px; }
  .notecard .nn { font-weight:700; font-size:13px; line-height:1.25; }
  .notecard .nw { font-size:11px; color:var(--muted); margin-top:2px; }
</style>
</head>
